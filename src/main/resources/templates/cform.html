<html xmlns:th="http://www.thymleaf.org">
<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Customer Form</title>
</head>
<body>
	<div align="center">
		<h3>Customer Details</h3>
		<hr>
		<form action="#" th:action="@{/save}" th:object="${customer}" method="POST">
			<!-- hidden form field -->
			<input type="hidden" th:field="*{id}" />
			<table>
				<tr>
					<td><input type="text" th:field="*{firstName}" placeholder="First name"></td>
				</tr>
				<tr>
					<td><input type="text" th:field="*{lastName}" placeholder="Last name"></td>
				</tr>
				<tr>
					<td><input type="text" th:field="*{email}" placeholder="Email"></td>
				</tr>
				<tr>
					<td><button type="submit" style="width: 100%">Save!</button></td>
				</tr>
			</table>
		</form>
		<hr>
		<a th:href="@{/}">Back to list</a>
	</div>
</body>
</html>
