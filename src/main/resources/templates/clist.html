<html xmlns:th="http://www.thymleaf.org">
<html>
<head>
<meta charset="ISO-8859-1">
<title>CRM Directory</title>
</head>
<body>
	<div align="center">
		<h3>CRM - Customer Relationship Management tool</h3>
		<hr>
		<table>
			<tr>
				<th>First Name</th>
				<th>Last Name</th>
				<th>Email</th>
				<th colspan="2">Action</th>
			</tr>
			<tr th:each="customer : ${customers}">
				<td th:text="${customer.firstName}" />
				<td th:text="${customer.lastName}" />
				<td th:text="${customer.email}" />
				<!-- Update Link -->
				<td>
					<a th:href="@{/update}">Update</a>
				</td>
				<!-- Delete Link -->
				<td>
					<a 	th:href="@{/delete}"
						onclick="if (!(confirm('Are you sure you want to delete this employee?'))) return false">Delete
					</a>
				</td>
			</tr>
		</table>
	</div>
</body>
</html>
